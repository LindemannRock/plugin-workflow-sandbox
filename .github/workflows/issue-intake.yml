name: Issue intake

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - name: Assign and classify issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = issue.body || '';
            const existingLabels = new Set(issue.labels.map((label) => label.name));

            const addLabels = async (labels) => {
              const nextLabels = [...new Set(labels)].filter((label) => !existingLabels.has(label));

              if (nextLabels.length === 0) {
                return;
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: nextLabels,
              });
            };

            if (context.payload.action === 'opened' && issue.assignees.length === 0) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issue.number,
                assignees: ['bhlindemann'],
              });
            }

            const sections = [...body.matchAll(/^###\s+(.+?)\s*\n+\s*([\s\S]*?)(?=\n###\s+|\s*$)/gm)];

            const extractSection = (labelPattern) => {
              const section = sections.find((match) => labelPattern.test(match[1].trim()));

              if (!section) {
                return '';
              }

              return section[2]
                .replace(/<!--[\s\S]*?-->/g, '')
                .trim();
            };

            const pluginVersionSection = sections.find((match) => {
              const label = match[1].trim();

              return /version$/i.test(label)
                && !/^craft cms/i.test(label)
                && !/^php/i.test(label);
            });
            const pluginVersionText = pluginVersionSection
              ? pluginVersionSection[2].replace(/<!--[\s\S]*?-->/g, '').trim()
              : '';

            const versionMatch = pluginVersionText.match(/\b(\d+)\.(\d+)\.(\d+)(?:[-+][0-9A-Za-z.-]+)?\b/);
            const pluginVersion = versionMatch ? versionMatch[0] : '';
            const major = versionMatch ? Number(versionMatch[1]) : null;
            const prerelease = pluginVersion.includes('-') ? pluginVersion.split('-')[1].toLowerCase() : '';

            const familyOverride = (body.match(/compatibility family:\s*(formie|freeform)/i) || [])[1]?.toLowerCase();
            const family = familyOverride
              || (repo.includes('formie') ? 'formie' : null)
              || (repo.includes('freeform') ? 'freeform' : null);

            const labelsToAdd = [];

            if (![...existingLabels].some((label) => label.startsWith('branch: '))) {
              if (family === 'formie' || family === 'freeform') {
                labelsToAdd.push(prerelease ? 'branch: unsure' : 'branch: main');
              } else if (prerelease.includes('alpha')) {
                labelsToAdd.push('branch: craft-6-alpha');
              } else if (prerelease.includes('beta')) {
                labelsToAdd.push('branch: craft-6-beta');
              } else if (pluginVersion) {
                labelsToAdd.push('branch: main');
              } else {
                labelsToAdd.push('branch: unsure');
              }
            }

            if (family === 'formie' && ![...existingLabels].some((label) => label.startsWith('compat: formie-'))) {
              if (major === 3) {
                labelsToAdd.push('compat: formie-3');
              } else if (major === 4 && prerelease.includes('beta')) {
                labelsToAdd.push('compat: formie-4-beta');
              } else if (major === 4) {
                labelsToAdd.push('compat: formie-4');
              }
            }

            if (family === 'freeform' && ![...existingLabels].some((label) => label.startsWith('compat: freeform-'))) {
              if (major === 5) {
                labelsToAdd.push('compat: freeform-5');
              } else if (major === 6 && prerelease.includes('beta')) {
                labelsToAdd.push('compat: freeform-6-beta');
              } else if (major === 6) {
                labelsToAdd.push('compat: freeform-6');
              }
            }

            await addLabels(labelsToAdd);
