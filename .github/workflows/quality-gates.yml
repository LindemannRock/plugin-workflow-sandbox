name: quality-gates

on:
  pull_request:
    branches:
      - main
      - craft-5
      - craft-6
      - craft-6-alpha
      - craft-6-beta
  push:
    branches:
      - main
      - craft-5
      - craft-6
      - craft-6-alpha
      - craft-6-beta

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist

      - name: Composer security audit
        run: composer audit

      - name: Validate Composer metadata
        run: composer validate --no-plugins --no-check-publish

      - name: Lint PHP files
        run: find src -name '*.php' -print0 | xargs -0 -n1 php -l
