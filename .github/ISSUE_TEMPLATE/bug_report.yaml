name: Bug Report
description: Report a bug or unexpected behavior.
labels: ['type: bug', 'status: needs triage']
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check:

          - I've searched the [documentation](https://github.com/LindemannRock/craft-release-please-test/tree/main/docs).
          - I've searched [open and closed issues](https://github.com/LindemannRock/craft-release-please-test/issues?q=is%3Aissue).

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen instead?
      placeholder: "I have an issue where..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: craft-version
    attributes:
      label: Craft CMS exact version
      description: "**Do not write \"latest\"** — check Craft's System Report."
      placeholder: e.g. 5.6.1
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Release-Please Test version
      description: "**Do not write \"latest\"** — check Craft's System Report or Settings → Plugins."
      placeholder: e.g. 5.2.0
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Check Craft's System Report.
      placeholder: e.g. 8.3.30

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help us reproduce the issue.
      value: |
        - Database:
        - Other relevant plugins:
        - Local, staging, or production:
        - Screenshots or log entries:
